<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen + Camera Overlay Recorder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23ef4444%22/><text x=%2250%25%22 y=%2250%25%22 font-size=%2270%22 font-family=%22sans-serif%22 font-weight=%22bold%22 text-anchor=%22middle%22 dominant-baseline=%22central%22 fill=%22white%22>Ω</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">

    <!-- Setup Page -->
    <div id="setupPage" class="page">

      <div class="hud-container">
        <!-- Layout Preview as the main HUD -->
        <div class="layout-preview" id="layoutPreview">
          
          <!-- Interactive Corner Targets for Position -->
          <div class="corner-target top-left" data-pos="top-left"></div>
          <div class="corner-target top-right" data-pos="top-right"></div>
          <div class="corner-target bottom-left" data-pos="bottom-left"></div>
          <div class="corner-target bottom-right" data-pos="bottom-right"></div>
          
          <!-- Camera Bubble -->
          <div class="preview-camera interactive-bubble" id="previewCamera" title="Click to change shape"></div>
        </div>

        <!-- Controls underneath preview -->
        <div class="controls-under">
           <div class="control-row">
             <div class="hud-control flex-grow">
               <label>📺 <span id="qualityLabel">720p</span></label>
               <input type="range" id="quality" min="0" max="3" step="1" value="1">
             </div>
             <div class="hud-control flex-grow">
               <label>📏 <span id="sizeLabel">40%</span></label>
               <input type="range" id="overlaySize" min="25" max="60" step="1" value="40">
             </div>
             <div class="hud-control mic-btn" id="micBtn" title="Toggle Microphone" style="cursor: pointer; justify-content: center;">
               <svg id="micIconOn" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
               <svg id="micIconOff" style="display:none; color: #ef4444;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6"></path><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
             </div>
           </div>
        </div>
        
        <!-- Unified Record Button -->
        <button id="beginRecording" class="btn btn-record">RECORD</button>
      </div>
    </div>

    <!-- Recording Page -->
    <div id="recordingPage" class="page hidden">
      <header>
        <h1>Recording...</h1>
      </header>
      <div class="video-container">
        <video id="preview" autoplay muted playsinline></video>
        <div class="video-label">Your Overlay Preview</div>
      </div>
      <div class="recording-controls">
        <button id="pauseBtn" class="btn btn-secondary">⏸️ Pause</button>
        <button id="stopBtn" class="btn btn-secondary">⏹️ Stop</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
