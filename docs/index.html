<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen + Camera Overlay Recorder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">

    <!-- Setup Page -->
    <div id="setupPage" class="page">
      <header>
        <h1>Setup Your Recording</h1>
      </header>
      <div class="settings-panel">
        <div class="settings-grid">
          <div class="settings-col">
            <div class="setting-group">
              <label>📍 Position</label>
              <div class="radio-grid position-grid">
                <label><input type="radio" name="overlayPosition" value="top-left"><span>↖️</span></label>
                <label><input type="radio" name="overlayPosition" value="top-right"><span>↗️</span></label>
                <label><input type="radio" name="overlayPosition" value="bottom-left"><span>↙️</span></label>
                <label><input type="radio" name="overlayPosition" value="bottom-right"><span>↘️</span></label>
              </div>
            </div>
            <div class="setting-group">
              <label>🔲 Shape</label>
              <div class="radio-group">
                <label><input type="radio" name="overlayShape" value="circle" checked><span>⚪</span></label>
                <label><input type="radio" name="overlayShape" value="rectangle"><span>⬜</span></label>
                <label><input type="radio" name="overlayShape" value="rounded"><span>🏟️</span></label>
              </div>
            </div>
          </div>

          <div class="settings-col">
            <div class="setting-group">
              <label>📏 Size: <span id="sizeLabel" class="val-label">40%</span></label>
              <input type="range" id="overlaySize" min="0" max="2" step="1" value="2">
            </div>
            <div class="setting-group">
              <label>📺 Quality: <span id="qualityLabel" class="val-label">720p</span></label>
              <input type="range" id="quality" min="0" max="3" step="1" value="1">
            </div>
            <div class="setting-group toggle-group">
              <label class="toggle-label">
                🎙️ Mic
                <div class="toggle-switch">
                  <input type="checkbox" id="includeMicrophone" checked>
                  <span class="slider round"></span>
                </div>
              </label>
            </div>
          </div>
        </div>

        <div class="preview-section">
          <label class="section-label">👁️ Layout Preview</label>
          <div class="layout-preview" id="layoutPreview">
            <div class="preview-camera" id="previewCamera"></div>
          </div>
        </div>
        
        <button id="beginRecording" class="btn btn-primary begin-btn">🎬 Begin Recording</button>
      </div>
    </div>

    <!-- Recording Page -->
    <div id="recordingPage" class="page hidden">
      <header>
        <h1>Recording...</h1>
      </header>
      <div class="video-container">
        <video id="preview" autoplay muted playsinline></video>
        <div class="video-label">Your Overlay Preview</div>
      </div>
      <div class="recording-controls">
        <button id="pauseBtn" class="btn btn-secondary">⏸️ Pause</button>
        <button id="stopBtn" class="btn btn-secondary">⏹️ Stop</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
